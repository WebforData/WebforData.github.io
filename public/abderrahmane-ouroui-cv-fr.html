<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Ingénieur Plateforme / DevOps orienté OCI. Je construis des plateformes de production sécurisées et observables avec Terraform, OKE/Kubernetes, IAM, réseau, CI/CD et fondations MLOps/data. OCI est mon environnement le plus approfondi; mes standards restent portables entre clouds : Infrastructure as Code, moindre privilège, promotion de versions, observabilité, coûts et modèles Kubernetes adaptables à AWS, GCP, Azure ou autres clouds." />
    <link rel="canonical" href="https://aouroui.dev/abderrahmane-ouroui-cv-fr.html" />
    <title>Abderrahmane Ouroui CV</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #15100e;
        --paper: #fffaf3;
        --ink: #211814;
        --muted: #76675d;
        --line: rgba(255, 250, 243, 0.18);
        --accent: #b64334;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background:
          radial-gradient(circle at 18% 0%, rgba(182, 67, 52, 0.22), transparent 28rem),
          linear-gradient(135deg, #15100e 0%, #241915 52%, #15100e 100%);
        color: var(--paper);
        font-family: Arial, "Segoe UI", Helvetica, sans-serif;
        margin: 0;
      }

      a {
        color: inherit;
      }

      .viewer-shell {
        display: grid;
        gap: 14px;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 100%;
        padding: 16px;
      }

      .viewer-toolbar {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin: 0 auto;
        max-width: 1120px;
        width: 100%;
      }

      .viewer-title {
        min-width: 0;
      }

      .viewer-title p {
        color: rgba(255, 250, 243, 0.68);
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        margin: 0 0 3px;
        text-transform: uppercase;
      }

      .viewer-title h1 {
        font-size: clamp(1rem, 3vw, 1.25rem);
        line-height: 1.2;
        margin: 0;
      }

      .viewer-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .viewer-actions a {
        background: rgba(255, 250, 243, 0.08);
        border: 1px solid var(--line);
        border-radius: 999px;
        color: #fffaf3;
        font-size: 0.86rem;
        padding: 8px 12px;
        text-decoration: none;
      }

      .viewer-actions a:hover,
      .viewer-actions a:focus-visible {
        background: rgba(182, 67, 52, 0.28);
        border-color: rgba(255, 250, 243, 0.34);
        outline: none;
      }

      .pdf-frame {
        background: #2b2420;
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
        display: block;
        height: min(1120px, calc(100vh - 90px));
        margin: 0 auto;
        max-width: 1120px;
        overflow: hidden;
        width: 100%;
      }

      .pdf-frame object,
      .pdf-frame iframe {
        border: 0;
        display: block;
        height: 100%;
        width: 100%;
      }

      .fallback {
        align-items: center;
        background: var(--paper);
        color: var(--ink);
        display: grid;
        gap: 10px;
        height: 100%;
        justify-items: center;
        padding: 28px;
        text-align: center;
      }

      .fallback p {
        color: var(--muted);
        margin: 0;
        max-width: 42rem;
      }

      .fallback a {
        color: var(--accent);
        font-weight: 700;
      }

      @media (max-width: 700px) {
        .viewer-shell {
          padding: 10px;
        }

        .viewer-toolbar {
          align-items: flex-start;
          display: grid;
        }

        .viewer-actions {
          justify-content: flex-start;
        }

        .pdf-frame {
          border-radius: 12px;
          height: calc(100vh - 122px);
        }
      }
    </style>
  </head>
  <body>
    <main class="viewer-shell">
      <header class="viewer-toolbar">
        <div class="viewer-title">
          <p>CV en ligne</p>
          <h1>Abderrahmane Ouroui</h1>
        </div>
        <nav class="viewer-actions" aria-label="CV actions">
          <a href="/">Portfolio</a>
          <a href="abderrahmane-ouroui-cv.html">English</a>
          <a href="abderrahmane-ouroui-cv-fr.pdf" target="_blank" rel="noreferrer">Ouvrir le PDF</a>
          <a href="abderrahmane-ouroui-cv-fr.pdf" download>Télécharger le PDF</a>
        </nav>
      </header>

      <section class="pdf-frame" aria-label="Abderrahmane Ouroui CV PDF">
        <object data="abderrahmane-ouroui-cv-fr.pdf#view=FitH" type="application/pdf">
          <iframe src="abderrahmane-ouroui-cv-fr.pdf#view=FitH" title="Abderrahmane Ouroui CV PDF">
            <div class="fallback">
              <p>Votre navigateur ne peut pas afficher le CV PDF intégré.</p>
              <a href="abderrahmane-ouroui-cv-fr.pdf" download>Télécharger le CV PDF</a>
            </div>
          </iframe>
        </object>
      </section>
    </main>
  </body>
</html>
